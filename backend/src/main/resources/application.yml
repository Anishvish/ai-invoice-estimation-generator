server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_invoice_db
    username: postgres
    password: postgres
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

app:
  company-name: DesignFlow India Pvt. Ltd.
  invoice-output-dir: ./generated-invoices
